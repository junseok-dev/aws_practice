name: 🚀 [EB] Deploy to Elastic Beanstalk
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  EB_APP_NAME: ${{ vars.EB_APP_NAME }}
  EB_ENV_NAME: ${{ vars.EB_ENV_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Deployment Package
        run: |
          cd backend
          zip -r ../deploy.zip . -x "*.git*" "db.sqlite3" "__pycache__/*" "*.pyc"

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APP_NAME }}
          environment_name: ${{ env.EB_ENV_NAME }}
          version_label: "app-${{ github.sha }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true

      - name: Get EB Environment URL
        id: get-url
        run: |
          URL=$(aws elasticbeanstalk describe-environments --application-name ${{ env.EB_APP_NAME }} --environment-names ${{ env.EB_ENV_NAME }} --query "Environments[0].CNAME" --output text)
          echo "eb_url=http://$URL" >> $GITHUB_OUTPUT

      - name: Display Deployment Summary
        run: |
          echo "=========================================================="
          echo "🚀 Deployment Completed Successfully!"
          echo "🔗 URL: ${{ steps.get-url.outputs.eb_url }}"
          echo "=========================================================="
          echo "### 🚀 EB Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: \`Elastic Beanstalk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: \`${{ env.EB_APP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Env**: \`${{ env.EB_ENV_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [${{ steps.get-url.outputs.eb_url }}](${{ steps.get-url.outputs.eb_url }})" >> $GITHUB_STEP_SUMMARY
