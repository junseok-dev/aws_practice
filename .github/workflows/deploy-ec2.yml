name: 🖥️ [EC2] Deploy to Amazon EC2

on:
  # 팀 저장소 정책: main 브랜치로의 머지(Merge) 또는 직접 푸시 발생 시 배포 수행
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # Update to your region (e.g., ap-northeast-2 for Seoul)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e  # Exit immediately if any command fails
            
            # Nuclear Reset: Delete existing folder to ensure a 100% clean sync
            echo "Performing Nuclear Reset of existing code..."
            rm -rf ~/aws_practice
            
            echo "Cloning fresh copy from GitHub..."
            git clone https://github.com/${{ github.repository }}.git ~/aws_practice
            cd ~/aws_practice
            
            # Optimization: Ensure swap space exists to prevent OOM (Out Of Memory) during build
            # t2.micro has only 1GB RAM, which is often not enough for building AI packages
            if [ $(free -m | awk '/^Swap:/{print $2}') -eq 0 ]; then
              echo "Creating 2GB swap file to assist build process..."
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo "Swap file created and enabled."
            fi
            
            # Debug: Verify requirements.txt content on the server
            echo "Verifying backend/requirements.txt content on server:"
            cat backend/requirements.txt
            
            # Go to backend directory where docker-compose is located
            cd backend
            
            # Create .env file dynamically from GitHub Secrets
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
            echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
            # Add database variables here later for PostgreSQL integration
            
            # Build and start Docker containers (using --no-cache to ensure fresh requirements)
            sudo docker-compose down
            sudo docker-compose build --no-cache
            sudo docker-compose up -d
            
            # Run migrations (Optional: Can be moved out of deploy script to a separate job)
            sudo docker-compose exec -T web python manage.py migrate
            
            echo "==============================================="
            echo "### 🖥️ EC2 Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **Target**: \`EC2 Standalone\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Host**: \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Access URL**: [http://${{ secrets.EC2_HOST }}:8000](http://${{ secrets.EC2_HOST }}:8000)" >> $GITHUB_STEP_SUMMARY
            echo "==============================================="
