name: Deploy to Amazon EC2

on:
  push:
    branches:
      - main  # Set to your default branch
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # Update to your region (e.g., ap-northeast-2 for Seoul)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }} # e.g., ubuntu or ec2-user
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory or clone if it doesn't exist
            if [ -d "~/aws_practice" ]; then
              cd ~/aws_practice
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git ~/aws_practice
              cd ~/aws_practice
            fi
            
            # Go to backend directory where docker-compose is located
            cd backend
            
            # Create .env file dynamically from GitHub Secrets
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
            echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
            # Add database variables here later for PostgreSQL integration
            
            # Build and start Docker containers
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # Run migrations (Optional: Can be moved out of deploy script to a separate job)
            sudo docker-compose exec -T web python manage.py migrate
            
            echo "Deployment completed successfully!"
